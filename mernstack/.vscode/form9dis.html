<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        /* --- General Reset & Typography --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px; /* Limits the form width to match image */
        }

        /* --- Header --- */
        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 20px;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
        }

        /* --- Form Layout --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: #444;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* --- Inputs & Selects --- */
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #888;
        }

        input::placeholder {
            color: #bbb;
        }

        /* --- Sub-labels (e.g., First Name, Street Address) --- */
        .sub-label {
            font-size: 11px;
            color: #777;
            margin-top: 5px;
        }

        /* --- Specific Section Styling --- */
        
        /* Birth Date specific layout */
        .dob-row {
            display: flex;
            gap: 10px;
        }
        .dob-col {
            flex: 1;
        }

        /* Textarea */
        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* --- Submit Button --- */
        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background-color: #1FC363; /* Matches the green in the image */
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background-color: #17a050;
        }

        /* --- Responsive Design (Mobile) --- */
        @media (max-width: 600px) {
            .row {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Registration Form</h1>
        <p class="subtitle">Fill out the form carefully for registration</p>
    </header>

    <form>
        <div class="form-group">
            <label class="form-label">Student Name</label>
            <div class="row">
                <div class="col">
                    <input type="text">
                    <span class="sub-label">First Name</span>
                </div>
                <div class="col">
                    <input type="text">
                    <span class="sub-label">Middle Name</span>
                </div>
                <div class="col">
                    <input type="text">
                    <span class="sub-label">Last Name</span>
                </div>
            </div>
        </div>

        <div class="row form-group">
            <div class="col">
                <label class="form-label">Birth Date</label>
                <div class="dob-row">
                    <div class="dob-col">
                        <select><option>Please</option></select>
                        <span class="sub-label">Month</span>
                    </div>
                    <div class="dob-col">
                        <select><option>Please</option></select>
                        <span class="sub-label">Day</span>
                    </div>
                    <div class="dob-col">
                        <select><option>Please</option></select>
                        <span class="sub-label">Year</span>
                    </div>
                </div>
            </div>
            <div class="col">
                <label class="form-label">Gender</label>
                <select>
                    <option>Please Select</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Address</label>
            
            <div style="margin-bottom: 15px;">
                <input type="text">
                <span class="sub-label">Street Address</span>
            </div>

            <div style="margin-bottom: 15px;">
                <input type="text">
                <span class="sub-label">Street Address Line 2</span>
            </div>

            <div class="row" style="margin-bottom: 15px;">
                <div class="col">
                    <input type="text">
                    <span class="sub-label">City</span>
                </div>
                <div class="col">
                    <input type="text">
                    <span class="sub-label">State / Province</span>
                </div>
            </div>

            <div>
                <input type="text">
                <span class="sub-label">Postal / Zip Code</span>
            </div>
        </div>

        <div class="row form-group">
            <div class="col">
                <label class="form-label">Student E-mail</label>
                <input type="email" placeholder="ex: myname@example.com">
                <span class="sub-label">example@example.com</span>
            </div>
            <div class="col">
                <label class="form-label">Mobile Number</label>
                <input type="tel" placeholder="(000) 000-0000">
            </div>
        </div>

        <div class="row form-group">
            <div class="col">
                <label class="form-label">Phone Number</label>
                <input type="tel" placeholder="(000) 000-0000">
            </div>
            <div class="col">
                <label class="form-label">Work Number</label>
                <input type="tel" placeholder="(000) 000-0000">
            </div>
        </div>

        <div class="row form-group">
            <div class="col">
                <label class="form-label">Company</label>
                <input type="text">
            </div>
            <div class="col">
                <label class="form-label">Courses</label>
                <select>
                    <option>Please Select</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Additional Comments</label>
            <textarea></textarea>
        </div>

        <div class="btn-container">
            <button type="submit">Submit</button>
        </div>

    </form>
</div>

</body>
</html>
