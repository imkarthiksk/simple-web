<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveGuard - Single File Project</title>
    <style>
        /* CSS Part Starts Here */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .payment-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 360px;
        }

        h2 { text-align: center; color: #333; margin-top: 0; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #f1f3f9;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        #goal-val { color: #f39c12; }
        #bal-val { color: #2ecc71; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: #667eea; outline: none; }

        .caution-box {
            background: #fff0f0;
            border: 1px dashed #ff4d4d;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .caution-box p { color: #d63031; font-size: 13px; margin: 0 0 10px 0; font-weight: bold; }

        .hidden { display: none; }

        .pay-btn {
            width: 100%;
            padding: 15px;
            background: #00d285;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .pay-btn.warning { background: #ff4d4d; }
        
        .msg { text-align: center; font-size: 12px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2>SaveGuard</h2>
        
        <div class="status-bar">
            <div>Balance: <span id="bal-val">₹6,000</span></div>
            <div>Goal: <span id="goal-val">₹5,000</span></div>
        </div>

        <div class="input-group">
            <label>How much to send?</label>
            <input type="number" id="amountInput" placeholder="Enter Amount">
        </div>

        <div id="cautionArea" class="caution-box hidden">
            <p>⚠️ Caution: Spending this will use your Savings!</p>
            <label>Confirm UPI PIN to proceed</label>
            <input type="password" id="pinInput" placeholder="Enter 4-digit PIN">
        </div>

        <button class="pay-btn" id="actionBtn" onclick="handleLogic()">Pay Now</button>
        <p class="msg" id="statusMsg">Safe & Secure Payments</p>
    </div>

    <script>
        /* JS Part Starts Here */
        let balance = 6000;
        let goal = 5000;
        let isCautionShown = false;

        function handleLogic() {
            const amount = Number(document.getElementById('amountInput').value);
            const cautionArea = document.getElementById('cautionArea');
            const actionBtn = document.getElementById('actionBtn');
            const statusMsg = document.getElementById('statusMsg');

            if (!amount || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }

            const projectedBalance = balance - amount;

            // Logic Check: Does it hit the savings goal?
            if (projectedBalance < goal && !isCautionShown) {
                // Trigger Caution
                cautionArea.classList.remove('hidden');
                actionBtn.innerText = "Confirm & Pay from Savings";
                actionBtn.classList.add('warning');
                statusMsg.innerText = "Security Check Required";
                statusMsg.style.color = "red";
                isCautionShown = true;
            } else {
                // Final Step: If caution was shown, check if PIN is entered
                if (isCautionShown) {
                    const pin = document.getElementById('pinInput').value;
                    if (pin.length < 4) {
                        alert("Please enter a valid 4-digit PIN");
                        return;
                    }
                }

                // Complete Transaction
                alert("Payment Successful! ₹" + amount + " sent.");
                location.reload(); // Reset everything
            }
        }
    </script>
</body>
</html>
