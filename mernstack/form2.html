<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .form{
            display: flex;
            justify-content:space-between ;
            margin-top: 1rem;
        }

        /* .form label,.gend label{
            text-align: start;
            display: inline-block;
            
        } */

        .main{
            width: 20%;
            background-color: aqua;
            position: relative;
            left: 40%;
            
        }

        textarea{
            width: 15rem;
        }
        .form input{
           
        }

        h1{
            text-align: center;
        }
        .button{
            margin-left:10rem ;
            margin-top: 1rem;
        }
        button{
            margin-left: 1rem;
        }


    </style>
    <form action="">
        <div class="bg" style="background-color: antiquewhite;">
        <h1>Registration Form</h1>
        <div class="main">

            <div class="form">
                <label for="first">First name</label>
                <input type="text" id="first" size="30">
            </div>

             <div class="form">
                <label for="last">Last name</label>
                <input type="text" id="last" size="30">
            </div>

             <div class="form">
                <label for="nick">Nick name</label>
                <input type="text" id="nick" size="30">
            </div>

             <div class="form">
                <label for="">Gender</label>
                <div class="gend">
                    <input type="radio" id="male" name="gender" value="Male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">Female</label>
                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">Female</label>
                </div>   
            </div>

            <div class="form">
                <label for="mobile">Mobile no</label>
                <input type="tel" id="mobile" size="30">
            </div>

            <div class="form">
                <label for="add">Address</label>
                <textarea name="" id="add" size="50">Address</textarea>
            </div>
             <div class="button">
             <button type="submit">Submit</button>
             <button type="reset">Reset</button></div>
        </div>
        
        </div>
    </form>
</body>
</html>
